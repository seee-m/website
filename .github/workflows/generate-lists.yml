name: Regenerate media lists

on:
  push:
    branches: [main]
    paths:
      - 'media/background/**'
      - 'media/work/**'
      - 'generate-lists.sh'

jobs:
  regenerate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Regenerate list files
        run: sh generate-lists.sh

      - name: Commit updated lists
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "📝 Auto-generate media list files [skip ci]"
          file_pattern: 'media/background/background.txt media/work/work.txt'
